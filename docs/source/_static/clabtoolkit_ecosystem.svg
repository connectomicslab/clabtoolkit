<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 950" width="1800" height="950">
  <style>
    .arc       { fill: none; stroke: #9a9a9a; stroke-width: 2.5; }
    .label     { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-anchor: middle; fill: #1a1a1a; }
    .python    { font-size: 72px; font-weight: 800; fill: #306998; letter-spacing: 1px; }
    .numeric   { font-size: 36px; font-weight: 700; fill: #1a1a1a; }
    .dataplot  { font-size: 28px; font-weight: 600; fill: #1f1f1f; }
    .interact  { font-size: 26px; font-weight: 500; fill: #333; }
    .neuro     { font-size: 30px; font-weight: 700; fill: #2c6e49; }
    .group     { font-size: 22px; font-weight: 600; fill: #444; }
    .group-sub { font-size: 14px; font-weight: 400; fill: #777; }
    .title     { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #c1272d; text-anchor: middle; letter-spacing: 2px; }
    .subtitle  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-style: italic; fill: #555; text-anchor: middle; }
    .legend    { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: #666; }
  </style>

  <rect width="1800" height="950" fill="#ffffff"/>

  <!-- Title banner -->
  <text x="800" y="78" class="title">clabtoolkit</text>
  <text x="800" y="108" class="subtitle">Connectomics Lab Toolkit — derived from actual module imports</text>

  <!-- Concentric half-ring arcs (cx=800, cy=930) -->
  <path class="arc" d="M 660,930 A 140,140 0 0 1 940,930"/>
  <path class="arc" d="M 520,930 A 280,280 0 0 1 1080,930"/>
  <path class="arc" d="M 380,930 A 420,420 0 0 1 1220,930"/>
  <path class="arc" d="M 240,930 A 560,560 0 0 1 1360,930"/>
  <path class="arc" d="M 100,930 A 700,700 0 0 1 1500,930"/>
  <path class="arc" d="M   0,930 A 800,800 0 0 1 1600,930"/>

  <!-- Layer 1 (innermost): Python -->
  <text x="800" y="885" class="label python">python</text>

  <!-- Layer 2: Numerical foundation (NumPy, SciPy) -->
  <text x="905" y="761" class="label numeric">SciPy</text>
  <text x="695" y="761" class="label numeric">NumPy</text>

  <!-- Layer 3: Data, plotting, image, storage -->
  <text x="1117" y="792" class="label dataplot">h5py</text>
  <text x="920"  y="611" class="label dataplot">pandas</text>
  <text x="680"  y="611" class="label dataplot">Matplotlib</text>
  <text x="483"  y="792" class="label dataplot">scikit-image</text>

  <!-- Layer 4: Interactive / 3D viz / terminal UX -->
  <text x="1244" y="732" class="label interact">colorama</text>
  <text x="968"  y="479" class="label interact">PyVista</text>
  <text x="632"  y="479" class="label interact">rich</text>
  <text x="356"  y="732" class="label interact">IPython</text>

  <!-- Layer 5: Neuroimaging domain libraries -->
  <text x="1346" y="626" class="label neuro">PyDICOM</text>
  <text x="963"  y="333" class="label neuro">NiBabel</text>
  <text x="637"  y="333" class="label neuro">DIPY</text>
  <text x="254"  y="626" class="label neuro">Nilearn</text>

  <!-- Layer 6 (outermost): clabtoolkit's own module clusters -->
  <!-- Right side (lower → upper) -->
  <text x="1524" y="744" class="label group">Pipelines &amp; Utilities</text>
  <text x="1524" y="763" class="label group-sub">pipelinetools · misctools</text>

  <text x="1375" y="448" class="label group">Visualization &amp; Plots</text>
  <text x="1375" y="467" class="label group-sub">visualizationtools · build_visualization_layout</text>
  <text x="1375" y="484" class="label group-sub">plottools · colorstools</text>

  <text x="1117" y="250" class="label group">Connectivity &amp; Networks</text>
  <text x="1117" y="269" class="label group-sub">connectivitytools · connectome · networktools</text>

  <!-- Top center -->
  <text x="800" y="180" class="label group">Diffusion &amp; Tractography</text>
  <text x="800" y="199" class="label group-sub">dwitools · tracttools</text>

  <!-- Left side (upper → lower) -->
  <text x="483" y="250" class="label group">Surfaces &amp; Parcellations</text>
  <text x="483" y="269" class="label group-sub">surfacetools · parcellationtools</text>
  <text x="483" y="286" class="label group-sub">freesurfertools · pointstools</text>

  <text x="225" y="448" class="label group">Image &amp; QC</text>
  <text x="225" y="467" class="label group-sub">imagetools · segmentationtools</text>
  <text x="225" y="484" class="label group-sub">qcqatools · morphometrytools</text>

  <text x="76" y="744" class="label group">BIDS &amp; DICOM</text>
  <text x="76" y="763" class="label group-sub">bidstools · dicomtools</text>

  <!-- Legend strip at bottom -->
  <text x="20" y="935" class="legend">Layers (inner → outer): Python · numerical core · data &amp; plotting · interactive/3D · neuroimaging libs · clabtoolkit modules</text>

</svg>
